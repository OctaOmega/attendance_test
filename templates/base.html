<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <title>
        {% block title %}
            Office Party Attendance
        {% endblock %}
    </title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >
</head>

<body>
    <main class="container">
        <header class="page-header">
            <h1>Office Party Attendance</h1>
            <p>Store and search employee attendance responses.</p>
        </header>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="flash {{ category }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endwith %}

        {% block content %}
        {% endblock %}
    </main>

    <script
        src="{{ url_for('static', filename='app.js') }}"
    ></script>
</body>
</html>
